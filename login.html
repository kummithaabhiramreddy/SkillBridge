<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillBridge – Sign In</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1c1c28;
      --accent: #7c6aff;
      --accent2: #ff6a8a;
      --accent3: #6affca;
      --text: #f0eeff;
      --muted: #7a7a9a;
      --border: rgba(124, 106, 255, 0.18);
    }

    html {
      font-size: 15px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      width: 100%;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .6;
        transform: scale(.8)
      }
    }

    @keyframes drift {

      0%,
      100% {
        transform: translate(0, 0)
      }

      33% {
        transform: translate(20px, -20px)
      }

      66% {
        transform: translate(-15px, 15px)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }

    .orb1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(124, 106, 255, 0.2), transparent 70%);
      top: -100px;
      left: -100px;
      animation: drift 10s ease-in-out infinite;
    }

    .orb2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 106, 138, 0.15), transparent 70%);
      bottom: -80px;
      right: -80px;
      animation: drift 12s ease-in-out infinite reverse;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2.2rem;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease both;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
    }

    .card-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s infinite;
    }

    .card-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }

    .card-header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .card-header p a {
      color: var(--accent);
      text-decoration: none;
    }

    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .social-btn:hover {
      border-color: var(--accent);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border);
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    label {
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--muted);
    }

    .forgot {
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
    }

    .input-wrap {
      position: relative;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.7rem 0.9rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.12);
    }

    input::placeholder {
      color: var(--muted);
    }

    .pw-toggle {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.83rem;
      color: var(--muted);
    }

    .remember input[type="checkbox"] {
      accent-color: var(--accent);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .btn-submit {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      box-shadow: 0 0 20px rgba(124, 106, 255, 0.3);
      margin-top: 0.5rem;
    }

    .btn-submit:hover {
      background: #9580ff;
      box-shadow: 0 0 30px rgba(124, 106, 255, 0.5);
      transform: translateY(-1px);
    }

    .testimonial {
      margin-top: 2rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
    }

    .testimonial-text {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.6;
      margin-bottom: 0.8rem;
    }

    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .t-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 800;
      font-family: 'Syne', sans-serif;
      color: white;
    }

    .t-name {
      font-size: 0.78rem;
      font-weight: 600;
    }

    .t-info {
      font-size: 0.72rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="login-card">
    <div class="card-header">
      <a href="index.html" class="logo">
        <div class="logo-dot"></div>SkillBridge
      </a>
      <h1>Welcome Back</h1>
      <p>Don't have an account? <a href="signup.html">Sign up free →</a></p>
    </div>

    <div class="social-btns">
      <button class="social-btn" onclick="handleSocialLogin('Google')">🌐 Google</button>
      <button class="social-btn" onclick="handleSocialLogin('LinkedIn')">📘 LinkedIn</button>
    </div>

    <div class="divider">or sign in with email</div>

    <form class="form" onsubmit="return handleLogin(event)">
      <div class="field">
        <label>Email Address</label>
        <input type="email" placeholder="you@email.com" required />
      </div>
      <div class="field">
        <div class="field-header">
          <label>Password</label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <div class="input-wrap">
          <input type="password" id="pwInput" placeholder="Your password" required />
          <span class="pw-toggle" onclick="togglePw()">👁</span>
        </div>
      </div>
      <label class="remember">
        <input type="checkbox" checked> Keep me signed in
      </label>
      <button class="btn-submit" type="submit" id="loginBtn">Sign In to SkillBridge</button>
    </form>

    <div class="testimonial">
      <div class="testimonial-text">"I taught Python for 2 months and earned enough credits to take a complete Carnatic
        music course. This platform changed how I think about learning."</div>
      <div class="testimonial-author">
        <div class="t-avatar">R</div>
        <div>
          <div class="t-name">Riya Kapoor</div>
          <div class="t-info">Data Science · Hyderabad</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs (v8 compat) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  
  <script src="core.js"></script>
  <script>
    // Initialize Firebase
    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
        console.log("Firebase initialized successfully");
      }
    } catch (err) {
      console.error("Firebase initialization error:", err);
    }
    function togglePassword() {
      const pw = document.getElementById('pwInput');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const email = document.querySelector('input[type="email"]').value;

      btn.textContent = 'Signing in…';
      btn.style.opacity = '0.7';

      // Mock login logic
      setTimeout(() => {
        SkillBridge.updateCurrentUser({ email: email, name: email.split('@')[0] });
        btn.textContent = '✓ Signed In! Loading Dashboard…';
        btn.style.background = 'var(--accent3)';
        btn.style.color = '#0a0a0f';
        btn.style.opacity = '1';
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      }, 1000);
    }

    async function handleSocialLogin(provider) {
      const btn = event.currentTarget;
      const originalHtml = btn.innerHTML;
      btn.innerHTML = `Connecting ${provider}...`;
      btn.style.opacity = '0.7';

      try {
        await SkillBridge.socialLogin(provider);
        btn.innerHTML = `✓ Success!`;
        btn.style.background = 'var(--accent3)';
        btn.style.color = '#0a0a0f';
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      } catch (err) {
        btn.innerHTML = originalHtml;
        btn.style.opacity = '1';
      }
    }
  </script>
</body>

</html>
